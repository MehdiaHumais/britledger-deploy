[flake8]
max-line-length = 100
extend-ignore = E203, W503, E501
exclude =
    .git,
    __pycache__,
    alembic/versions/,
    .venv,
    venv,
    build,
    dist

[isort]
profile = black
line_length = 100
known_first_party = app

[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
